  <!-- Sky -->
  <rect width="800" height="1000" fill="url(#sky)"/>

  <!-- Ground -->
  <rect x="0" y="900" width="800" height="100" fill="#86EFAC" rx="0"/>
  <rect x="0" y="890" width="800" height="20" fill="#4ADE80" rx="5"/>

  <!-- Building shadow -->
  <rect x="210" y="150" width="400" height="760" fill="#374151" opacity="0.15" rx="4" transform="skewX(-3)"/>

  <!-- Main building body -->
