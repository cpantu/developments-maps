<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#B0E0E6"/>
    </linearGradient>
    <linearGradient id="brick" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="50%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="1000" fill="url(#sky2)"/>

  <!-- Ground -->
  <rect x="0" y="880" width="800" height="120" fill="#86EFAC"/>
  <rect x="0" y="870" width="800" height="20" fill="#4ADE80" rx="5"/>

  <!-- Building body -->
  <rect x="150" y="200" width="500" height="680" fill="url(#brick)" rx="3"/>

  <!-- Decorative cornice -->
  <rect x="140" y="195" width="520" height="15" fill="#92400E" rx="3"/>
  <rect x="140" y="870" width="520" height="15" fill="#92400E" rx="3"/>

  <!-- Floor separator lines -->
  <line x1="150" y1="335" x2="650" y2="335" stroke="#92400E" stroke-width="2"/>
  <line x1="150" y1="470" x2="650" y2="470" stroke="#92400E" stroke-width="2"/>
  <line x1="150" y1="605" x2="650" y2="605" stroke="#92400E" stroke-width="2"/>
  <line x1="150" y1="740" x2="650" y2="740" stroke="#92400E" stroke-width="2"/>

  <!-- Piso 4 -->
  <text x="135" y="275" fill="#7C2D12" font-family="Arial" font-size="14" text-anchor="end" font-weight="bold">P4</text>
  <rect x="185" y="225" width="70" height="90" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="2"/>
  <rect x="285" y="225" width="70" height="90" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="2"/>
  <rect x="445" y="225" width="70" height="90" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="2"/>
  <rect x="545" y="225" width="70" height="90" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="2"/>

  <!-- Piso 3 -->
  <text x="135" y="410" fill="#7C2D12" font-family="Arial" font-size="14" text-anchor="end" font-weight="bold">P3</text>
  <rect x="185" y="360" width="70" height="90" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="2"/>
  <rect x="285" y="360" width="70" height="90" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="2"/>
  <rect x="445" y="360" width="70" height="90" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="2"/>
  <rect x="545" y="360" width="70" height="90" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="2"/>

  <!-- Piso 2 -->
  <text x="135" y="545" fill="#7C2D12" font-family="Arial" font-size="14" text-anchor="end" font-weight="bold">P2</text>
  <rect x="185" y="495" width="70" height="90" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="2"/>
  <rect x="285" y="495" width="70" height="90" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="2"/>
  <rect x="445" y="495" width="70" height="90" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="2"/>
  <rect x="545" y="495" width="70" height="90" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="2"/>

  <!-- Piso 1 -->
  <text x="135" y="680" fill="#7C2D12" font-family="Arial" font-size="14" text-anchor="end" font-weight="bold">P1</text>
  <rect x="185" y="630" width="70" height="90" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="2"/>
  <rect x="285" y="630" width="70" height="90" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="2"/>
  <rect x="445" y="630" width="70" height="90" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="2"/>
  <rect x="545" y="630" width="70" height="90" fill="#FEF3C7" stroke="#92400E" stroke-width="2" rx="2"/>

  <!-- PB - Entrance -->
  <text x="135" y="810" fill="#7C2D12" font-family="Arial" font-size="14" text-anchor="end" font-weight="bold">PB</text>
  <rect x="185" y="760" width="120" height="95" fill="#E5E7EB" stroke="#92400E" stroke-width="2" rx="2"/>
  <text x="245" y="815" fill="#6B7280" font-family="Arial" font-size="10" text-anchor="middle">Local</text>
  <rect x="345" y="755" width="110" height="115" fill="#7C2D12" rx="5"/>
  <rect x="355" y="760" width="90" height="105" fill="#451A03" rx="3"/>
  <rect x="395" y="790" width="10" height="50" fill="#D97706" rx="1"/>
  <rect x="495" y="760" width="120" height="95" fill="#E5E7EB" stroke="#92400E" stroke-width="2" rx="2"/>
  <text x="555" y="815" fill="#6B7280" font-family="Arial" font-size="10" text-anchor="middle">Local</text>

  <!-- Building name plate -->
  <rect x="300" y="873" width="200" height="28" fill="#7C2D12" rx="4"/>
  <text x="400" y="893" fill="#FEF3C7" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">CASONA DE PILAR</text>

  <!-- Trees -->
  <circle cx="90" cy="840" r="40" fill="#22C55E" opacity="0.8"/>
  <circle cx="80" cy="815" r="32" fill="#16A34A" opacity="0.8"/>
  <rect x="82" y="860" width="12" height="30" fill="#92400E" rx="2"/>

  <circle cx="720" cy="835" r="45" fill="#22C55E" opacity="0.8"/>
  <circle cx="730" cy="810" r="35" fill="#16A34A" opacity="0.8"/>
  <rect x="718" y="860" width="12" height="30" fill="#92400E" rx="2"/>
</svg>
